<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>خارطة المجد</title>
    <meta name="theme-color" content="#CE1126" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="خارطة المجد" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.png" />
  </head>
  <body>
    <div id="root">
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; direction: rtl;">
        <div style="text-align: center;">
          <h2 style="color: #CE1126;">جاري تحميل خارطة المجد...</h2>
          <p style="color: #666;">إذا استغرق الأمر وقتاً طويلاً، يرجى التحقق من اتصال الإنترنت أو تحديث الصفحة.</p>
          <div id="error-display" style="margin-top: 20px; color: red; font-size: 12px; font-family: monospace; white-space: pre-wrap; text-align: left; max-width: 80vw; margin-left: auto; margin-right: auto;"></div>
        </div>
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var display = document.getElementById('error-display');
        if (display) {
          display.innerHTML = 'Error: ' + msg + '\nLine: ' + lineNo + '\nColumn: ' + columnNo;
        }
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered', reg))
            .catch(err => console.log('Service Worker registration failed', err));
        });
      }
    </script>
  </body>
</html>
